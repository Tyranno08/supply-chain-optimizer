# docker-compose.yml
# Runs the full stack: FastAPI + MySQL

version: "3.9"

services:

  # ---- Supply Chain AI API ----
  api:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: supply_chain_api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_NAME=supply_chain_db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
    depends_on:
      mysql_db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ---- MySQL Database ----
  mysql_db:
    image: mysql:8.0
    container_name: supply_chain_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE:      supply_chain_db
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASS}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

volumes:
  mysql_data:
