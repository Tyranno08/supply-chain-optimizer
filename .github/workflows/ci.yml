# .github/workflows/ci.yml
# ============================================
# GITHUB ACTIONS CI/CD PIPELINE
# Triggers on every push to main branch
# Steps:
#   1. Checkout code
#   2. Set up Python
#   3. Install dependencies
#   4. Run unit tests
#   5. Build Docker image
# ============================================

name: Supply Chain AI — CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ============================================
  # JOB 1: RUN TESTS
  # ============================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic httpx pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric
          pip install xgboost scikit-learn joblib pandas numpy
          pip install python-dotenv sqlalchemy pymysql

      - name: Create dummy model artifacts for testing
        run: |
          mkdir -p models data/processed
          python -c "
          import pickle, joblib, torch, json, numpy as np
          from sklearn.preprocessing import StandardScaler

          # Create minimal dummy artifacts so tests can import
          scaler = StandardScaler()
          scaler.fit(np.zeros((10, 50)))
          joblib.dump(scaler, 'models/feature_scaler.joblib')

          with open('models/ensemble_config.pkl', 'wb') as f:
              pickle.dump({
                  'xgb_weight': 0.55,
                  'gnn_weight': 0.45,
                  'feature_columns': [],
                  'model_paths': {}
              }, f)

          with open('models/clf_threshold.json', 'w') as f:
              json.dump({'optimal_threshold': 0.5}, f)

          print('Dummy artifacts created.')
          "

      - name: Run API tests
        env:
          DB_USER:         test_user
          DB_PASS:         test_pass
          DB_HOST:         localhost
          DB_NAME:         test_db
          WEATHER_API_KEY: dummy_key
          NEWS_API_KEY:    dummy_key
        run: |
          pytest tests/test_api.py -v \
            --tb=short \
            -k "Health" \
            --no-header
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            .pytest_cache/
          retention-days: 7

  # ============================================
  # JOB 2: BUILD DOCKER IMAGE
  # ============================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy artifacts for Docker build
        run: |
          mkdir -p models data/processed/visualizations data/raw logs
          touch models/.gitkeep
          touch data/processed/.gitkeep
          echo "DB_USER=root" > .env
          echo "DB_PASS=password" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_NAME=supply_chain_db" >> .env
          echo "WEATHER_API_KEY=dummy" >> .env
          echo "NEWS_API_KEY=dummy" >> .env

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context:    .
          push:       false
          tags:       supply-chain-optimizer:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Docker image build success
        run: echo "Docker image built successfully"
